name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Makefile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Makefile quality gate
        env:
          GOLANGCI_MODULES_DOWNLOAD_MODE: vendor
        run: make ci-check

  build:
    name: Test build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/aws-ssm-params-${GOOS}-${GOARCH}${EXT}" ./cmd/aws-ssm-params

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - check
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          mkdir -p dist release

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            binary="aws-ssm-params${ext}"
            artifact="aws-ssm-params-${version}-${goos}-${goarch}"
            build_dir="dist/${artifact}"
            mkdir -p "$build_dir"

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" -o "${build_dir}/${binary}" ./cmd/aws-ssm-params

            cp README.md "$build_dir/"
            if [ -f LICENSE ]; then
              cp LICENSE "$build_dir/"
            fi

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "../release/${artifact}.zip" "${artifact}")
            else
              tar -C dist -czf "release/${artifact}.tar.gz" "${artifact}"
            fi
          done

          (cd release && sha256sum * > checksums.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
