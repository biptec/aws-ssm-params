version: 2

project_name: aws-ssm-params

dist: dist

builds:
  - id: aws-ssm-params
    main: ./cmd/aws-ssm-params
    binary: aws-ssm-params
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: aws-ssm-params
    ids:
      - aws-ssm-params
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    wrap_in_directory: "{{ .ProjectName }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc

release:
  github:
    owner: biptec
    name: aws-ssm-params

brews:
  - name: aws-ssm-params
    ids:
      - aws-ssm-params
    directory: Formula
    homepage: "https://github.com/biptec/aws-ssm-params"
    description: "Terminal UI and CLI for AWS SSM Parameter Store"
    license: MIT
    commit_msg_template: "chore(homebrew): update {{ .ProjectName }} formula to {{ .Tag }}"
    repository:
      owner: biptec
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "aws-ssm-params"
    test: |
      system "#{bin}/aws-ssm-params", "--help"
