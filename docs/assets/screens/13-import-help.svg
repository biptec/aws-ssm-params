<svg xmlns="http://www.w3.org/2000/svg" width="1171" height="412" viewBox="0 0 1171 412" role="img" aria-label="CLI: import command">
  <rect width="100%" height="100%" rx="18" fill="#06101f"/>
  <rect x="1" y="1" width="1169" height="410" rx="18" fill="none" stroke="#1e3354"/>
  <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="28" r="6" fill="#28c840"/>
  <text x="585" y="33" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8fb3d9">CLI: import command</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d7e2f1">
    <text x="28" y="64" xml:space="preserve">NAME:</text><text x="28" y="84" xml:space="preserve">   aws-ssm-params import - Import parameter values from stdin or file</text><text x="28" y="104" xml:space="preserve"></text><text x="28" y="124" xml:space="preserve">USAGE:</text><text x="28" y="144" xml:space="preserve">   aws-ssm-params [global options] import --from-file path [command options]</text><text x="28" y="164" xml:space="preserve"></text><text x="28" y="184" xml:space="preserve">OPTIONS:</text><text x="28" y="204" xml:space="preserve">   --from-file value               read import data from file; stdin is used when omitted</text><text x="28" y="224" xml:space="preserve">   --format value                  input format: dotenv or json (default: &quot;dotenv&quot;)</text><text x="28" y="244" xml:space="preserve">   --default-override              overwrite existing non-empty values when imported records do not specify override metadata (defau</text><text x="28" y="264" xml:space="preserve">   --default-type value, -t value  default parameter type: string, string-list, or secure-string</text><text x="28" y="284" xml:space="preserve">   --default-tier value            default parameter tier: standard, advanced, or intelligent-tiering</text><text x="28" y="304" xml:space="preserve">   --default-data-type value       default parameter data type: text, aws:ec2:image, or aws:ssm:integration</text><text x="28" y="324" xml:space="preserve">   --default-region value          default AWS region for imported records without region metadata</text><text x="28" y="344" xml:space="preserve">   --default-description value     default parameter description</text><text x="28" y="364" xml:space="preserve">   --help, -h                      show help</text>
  </g>
</svg>
