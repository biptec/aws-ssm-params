<svg xmlns="http://www.w3.org/2000/svg" width="760" height="272" viewBox="0 0 760 272" role="img" aria-label="CLI: get command">
  <rect width="100%" height="100%" rx="18" fill="#06101f"/>
  <rect x="1" y="1" width="758" height="270" rx="18" fill="none" stroke="#1e3354"/>
  <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="28" r="6" fill="#28c840"/>
  <text x="380" y="33" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8fb3d9">CLI: get command</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d7e2f1">
    <text x="28" y="64" xml:space="preserve">NAME:</text><text x="28" y="84" xml:space="preserve">   aws-ssm-params get - Print a parameter value</text><text x="28" y="104" xml:space="preserve"></text><text x="28" y="124" xml:space="preserve">USAGE:</text><text x="28" y="144" xml:space="preserve">   aws-ssm-params [global options] get &lt;name&gt; [--file path]</text><text x="28" y="164" xml:space="preserve"></text><text x="28" y="184" xml:space="preserve">OPTIONS:</text><text x="28" y="204" xml:space="preserve">   --file value  write value to file instead of stdout</text><text x="28" y="224" xml:space="preserve">   --help, -h    show help</text>
  </g>
</svg>
