<svg xmlns="http://www.w3.org/2000/svg" width="1078" height="452" viewBox="0 0 1078 452" role="img" aria-label="CLI: set command">
  <rect width="100%" height="100%" rx="18" fill="#06101f"/>
  <rect x="1" y="1" width="1076" height="450" rx="18" fill="none" stroke="#1e3354"/>
  <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="28" r="6" fill="#28c840"/>
  <text x="539" y="33" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8fb3d9">CLI: set command</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d7e2f1">
    <text x="28" y="64" xml:space="preserve">NAME:</text><text x="28" y="84" xml:space="preserve">   aws-ssm-params set - Set a String, StringList, or SecureString parameter value</text><text x="28" y="104" xml:space="preserve"></text><text x="28" y="124" xml:space="preserve">USAGE:</text><text x="28" y="144" xml:space="preserve">   aws-ssm-params [global options] set &lt;name&gt; &lt;value&gt; [command options]</text><text x="28" y="164" xml:space="preserve">   aws-ssm-params [global options] set &lt;name&gt; --file path [command options]</text><text x="28" y="184" xml:space="preserve"></text><text x="28" y="204" xml:space="preserve">OPTIONS:</text><text x="28" y="224" xml:space="preserve">   --file value            read value from file</text><text x="28" y="244" xml:space="preserve">   --override              overwrite existing values (default: false)</text><text x="28" y="264" xml:space="preserve">   --type value, -t value  parameter type: string, string-list, or secure-string; existing type is preserved when omitted</text><text x="28" y="284" xml:space="preserve">   --tier value            parameter tier: standard, advanced, or intelligent-tiering</text><text x="28" y="304" xml:space="preserve">   --data-type value       parameter data type: text, aws:ec2:image, or aws:ssm:integration</text><text x="28" y="324" xml:space="preserve">   --region value          target AWS region; overrides the global primary region for this write</text><text x="28" y="344" xml:space="preserve">   --description value     parameter description</text><text x="28" y="364" xml:space="preserve">   --policies value        parameter policies JSON</text><text x="28" y="384" xml:space="preserve">   --policies-file value   read parameter policies JSON from file</text><text x="28" y="404" xml:space="preserve">   --help, -h              show help</text>
  </g>
</svg>
