  <circle cx="74" cy="28" r="6" fill="#28c840"/>
  <text x="484" y="33" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8fb3d9">TUI: context-sensitive shortcuts</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d7e2f1">
    <text x="28" y="64" xml:space="preserve">                                       ╭──────────────────── Shortcuts ─────────────────────╮</text><text x="28" y="84" xml:space="preserve">   #   NAME ↓                          │                                                    │    LEN  SHA256</text><text x="28" y="104" xml:space="preserve">                                       │  Actions                                           │</text><text x="28" y="124" xml:space="preserve">   1   /acme/prod/service-18/DATABASE_U│    enter        edit value                         │rd  8    012012</text><text x="28" y="144" xml:space="preserve">   2   /acme/prod/service-17/FEATURE_FL│    n            new parameter                      │rd  8    011011</text><text x="28" y="164" xml:space="preserve">   3   /acme/prod/service-16/LOG_LEVEL │    d            show/hide details                  │rd  8    010010</text><text x="28" y="184" xml:space="preserve">   4   /acme/prod/service-15/SESSION_SE│    /            search                             │rd  8    00f00f</text><text x="28" y="204" xml:space="preserve">   5   /acme/prod/service-14/STRIPE_SEC│    c            columns                            │rd  8    00e00e</text><text x="28" y="224" xml:space="preserve">   6   /acme/prod/service-13/JWT_SECRET│    s            sort popup                         │rd  8    00d00d</text><text x="28" y="244" xml:space="preserve">   7   /acme/prod/service-12/DATABASE_U│    x            delete selected value              │rd  8    00c00c</text><text x="28" y="264" xml:space="preserve">   8   /acme/prod/service-11/FEATURE_FL│    X            delete visible/filtered values     │rd  8    00b00b</text><text x="28" y="284" xml:space="preserve">   9   /acme/prod/service-10/LOG_LEVEL │    esc / q      quit                               │rd  8    00a00a</text><text x="28" y="304" xml:space="preserve">   10  /acme/prod/service-09/SESSION_SE│                                                    │rd  8    009009</text><text x="28" y="324" xml:space="preserve">   11  /acme/prod/service-08/STRIPE_SEC│                                                    │rd  8    008008</text><text x="28" y="344" xml:space="preserve">   12  /acme/prod/service-07/JWT_SECRET│  Sort                                              │rd  8    007007</text><text x="28" y="364" xml:space="preserve">   13  /acme/prod/service-06/DATABASE_U│    1            sort by Name                       │rd  8    006006</text><text x="28" y="384" xml:space="preserve">   14  /acme/prod/service-05/FEATURE_FL│    2            sort by Type                       │rd  8    005005</text><text x="28" y="404" xml:space="preserve">   15  /acme/prod/service-04/LOG_LEVEL │    3            sort by Region                     │rd  8    004004</text><text x="28" y="424" xml:space="preserve"> | 16  /acme/prod/service-03/SESSION_SE│    4            sort by Date                       │rd  8    003003</text><text x="28" y="444" xml:space="preserve">   17  /acme/prod/service-02/STRIPE_SEC│    5            sort by Tier                       │rd  8    002002</text><text x="28" y="464" xml:space="preserve">   18  /acme/prod/service-01/JWT_SECRET│    6            sort by Len                        │rd  8    001001</text><text x="28" y="484" xml:space="preserve">   19  /acme/prod/api/MISSING_REQUIRED_│    7            sort by SHA256                     │    -    -</text><text x="28" y="504" xml:space="preserve">                                       │                                                    │</text><text x="28" y="524" xml:space="preserve">                                       │  Navigation                                        │</text><text x="28" y="544" xml:space="preserve">                                       │    ↑ / ctrl+p / shift+tab     previous row/option  │</text><text x="28" y="564" xml:space="preserve">                                       │    ↓ / ctrl+n / tab           next row/option      │</text><text x="28" y="584" xml:space="preserve">                                       │    PgUp / alt+v               page up              │</text><text x="28" y="604" xml:space="preserve">                                       │    PgDn / ctrl+v              page down            │</text><text x="28" y="624" xml:space="preserve">                                       │    Home / alt+&lt;               first row/option     │</text><text x="28" y="644" xml:space="preserve">                                       │    End / alt+&gt;                last row/option      │</text><text x="28" y="664" xml:space="preserve">                                       │                                                    │</text><text x="28" y="684" xml:space="preserve">                                       │  Global                                            │</text><text x="28" y="704" xml:space="preserve">                                       │    ctrl+/       open shortcuts                     │</text><text x="28" y="724" xml:space="preserve"></text><text x="28" y="744" xml:space="preserve">esc close</text>
  </g>
</svg>
