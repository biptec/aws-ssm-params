<svg xmlns="http://www.w3.org/2000/svg" width="909" height="312" viewBox="0 0 909 312" role="img" aria-label="CLI: export command">
  <rect width="100%" height="100%" rx="18" fill="#06101f"/>
  <rect x="1" y="1" width="907" height="310" rx="18" fill="none" stroke="#1e3354"/>
  <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="28" r="6" fill="#28c840"/>
  <text x="454" y="33" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8fb3d9">CLI: export command</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d7e2f1">
    <text x="28" y="64" xml:space="preserve">NAME:</text><text x="28" y="84" xml:space="preserve">   aws-ssm-params export - Export parameter values to stdout</text><text x="28" y="104" xml:space="preserve"></text><text x="28" y="124" xml:space="preserve">USAGE:</text><text x="28" y="144" xml:space="preserve">   aws-ssm-params [global options] export [command options]</text><text x="28" y="164" xml:space="preserve"></text><text x="28" y="184" xml:space="preserve">OPTIONS:</text><text x="28" y="204" xml:space="preserve">   --format value     output format: dotenv or json (default: &quot;dotenv&quot;)</text><text x="28" y="224" xml:space="preserve">   --json-key-field value  AWS field to use as JSON object key instead of JSON array records</text><text x="28" y="244" xml:space="preserve">   --include-missing  include missing parameters as empty records (default: false)</text><text x="28" y="264" xml:space="preserve">   --help, -h         show help</text>
  </g>
</svg>
