version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - forbidigo
    - gocritic
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace
    - wrapcheck
    - godox
    - depguard
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - "$all"
          deny:
            - pkg: "errors$"
              desc: "Use github.com/cockroachdb/errors instead of standard library errors"
    nolintlint:
      require-specific: true
      require-explanation: true
      allow-unused: false
      allow-no-explanation: []

    godox:
      keywords:
        - nolint
        - '#nosec'
        - gosec:disable
        - revive:disable
        - lint:ignore
        - lint:file-ignore
        - exhaustive:ignore
        - permit

    gosec:
      global:
        nosec: true
      excludes:
        - G304 # This CLI intentionally reads user-provided inventory/import/export paths.
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    staticcheck:
      checks:
        - all

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam

    importas:
      no-unaliased: true
      no-extra-aliases: true
      alias:
        - pkg: github.com/cockroachdb/errors
          alias: crerr

    wrapcheck:
      extra-ignore-sigs:
        - crerr.Newf(
        - crerr.New(
        - crerr.Errorf(
        - crerr.NewWithDepthf(
        - crerr.WithMessagef(
        - crerr.Wrapf(
        - crerr.WrapWithDepth(
        - crerr.Join(
        - crerr.JoinWithDepth(

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
